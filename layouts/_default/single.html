{{ partial "header.html" . }}

  <main role="main">
    <article itemscope itemtype="http://schema.org/BlogPosting">
      <div class="entry-header">
        <div class="bubble bubble-{{ if .Params.categories }}{{ range .Params.categories }}{{ . | urlize }}{{ end }}{{ end }}"></div>
        <h1 class="entry-title" itemprop="headline">{{ .Title }}{{ if .Draft }} #Draft{{ end }}</h1>
        <span class="entry-meta"><time itemprop="datePublished" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02 15:04:05" }}</time>{{ if .Params.categories }} {{ range .Params.categories }}<a href="/categories/{{ . | urlize }}">#{{ . }}</a>{{ end }}{{ end }}</span>{{ with .Params.excerpt }}<p class="entry-excerpt">{{ . }}</p>{{ end }}
      </div>
      <section itemprop="text">
        {{ .Content }}
      </section>
      <div class="share">
        <a href="https://twitter.com/share?url={{ .Permalink }}&text={{ .Title }}" onclick="javascript:window.open(this.href, '', 'menubar=no,toolbar=no,height=300,width=600');return false;" class="twitter">
          <img src="/assets/fonts/twitter.svg" width="18" height="18">
        </a>
        <a href="https://www.facebook.com/sharer.php?u={{ .Permalink }}" onclick="javascript:window.open(this.href, '', 'menubar=no,toolbar=no,height=300,width=600');return false;" class="facebook">
          <img src="/assets/fonts/facebook.svg" width="18" height="18">
        </a>
        <a href="https://getpocket.com/edit?url={{ .Permalink }}&title={{ .Title }}" onclick="javascript:window.open(this.href, '', 'menubar=no,toolbar=no,scrollbars=yes,height=300,width=600');return false;" class="pocket">
          <img src="/assets/fonts/pocket.svg" width="18" height="18">
        </a>
      </div>
    </article>
    <div id="disqus_thread"></div>
    <script type="text/javascript">
        /* * * CONFIGURATION VARIABLES: EDIT BEFORE PASTING INTO YOUR WEBPAGE * * */
        var disqus_shortname = 'xiaosongfu'; // required: replace example with your forum shortname

        /* * * DON'T EDIT BELOW THIS LINE * * */
        (function() {
            var dsq = document.createElement('script'); dsq.type = 'text/javascript'; dsq.async = true;
            dsq.src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(dsq);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </main>

{{ partial "footer.html" . }}
